<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad - 빠른 메모</title>
  <style>
    :root {
      --bg-gradient-start: #fdfbfb;
      --bg-gradient-end: #ebedee;
      --card-bg: rgba(255, 255, 255, 0.85);
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --secondary-color: #f1f5f9;
      --secondary-hover: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #cbd5e1;
      --danger-color: #ef4444;
      --danger-hover: #dc2828;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-main);
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 16px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
      color: var(--primary-color);
      letter-spacing: -0.5px;
    }

    .input-section {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      resize: none;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: rgba(255, 255, 255, 0.9);
    }

    textarea:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px; /* Slightly smaller to fit 4 buttons */
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      white-space: nowrap;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--secondary-color);
      color: var(--primary-color);
    }
    .btn-secondary:hover {
      background: var(--secondary-hover);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger-color);
    }
    .btn-danger:hover {
      background: #fecaca;
    }

    .btn-info {
      background: #e0f2fe;
      color: #0284c7;
    }
    .btn-info:hover {
      background: #bae6fd;
    }

    .list-section {
      border-top: 1px solid var(--border-color);
      padding-top: 16px;
    }

    .list-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .notes-list {
      width: 100%;
      height: 120px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 8px;
      outline: none;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.9);
    }

    .notes-list option {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .notes-list option:checked {
      background: rgba(99, 102, 241, 0.1) linear-gradient(0deg, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0.1) 100%);
      color: var(--primary-color);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>📝 Notepad</h1>
    
    <div class="input-section">
      <textarea id="memoInput" rows="3" maxlength="300" placeholder="여기에 2~3줄 메모를 입력하세요..."></textarea>
    </div>
    
    <div class="actions">
      <button class="btn-primary" id="saveBtn">저장</button>
      <button class="btn-secondary" id="loadBtn">불러오기</button>
      <button class="btn-info" id="downloadBtn">다운로드</button>
      <button class="btn-danger" id="deleteBtn">삭제</button>
    </div>

    <div class="list-section">
      <div class="list-label">최근 저장된 메모 (선택 후 동작)</div>
      <select id="notesList" class="notes-list" size="4"></select>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const memoInput = document.getElementById('memoInput');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const notesList = document.getElementById('notesList');
    const toast = document.getElementById('toast');
    let toastTimeout;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    async function fetchNotes() {
      try {
        const res = await fetch('/api/notes');
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        
        notesList.innerHTML = '';
        data.forEach(note => {
          const opt = document.createElement('option');
          opt.value = note.id;
          // Truncate for display
          const displayStr = note.content.length > 50 ? note.content.slice(0, 47) + '...' : note.content;
          opt.textContent = displayStr;
          opt.title = note.content; // Full text on hover
          notesList.appendChild(opt);
        });
      } catch (e) {
        showToast('메모 목록을 불러오지 못했습니다.');
        console.error(e);
      }
    }

    async function saveNote() {
      const content = memoInput.value.trim();
      if (!content) {
        showToast('내용을 입력해주세요.');
        memoInput.focus();
        return;
      }

      try {
        const res = await fetch('/api/notes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        
        if (!res.ok) throw new Error('Save failed');
        
        showToast('성공적으로 저장되었습니다.');
        memoInput.value = '';
        await fetchNotes();
      } catch (e) {
        showToast('저장에 실패했습니다.');
        console.error(e);
      }
    }

    async function deleteNote() {
      const selectedId = notesList.value;
      if (!selectedId) {
        showToast('삭제할 메모를 아래에서 선택해주세요.');
        return;
      }
      
      if (!confirm('정말 이 메모를 삭제하시겠습니까?')) return;

      try {
        const res = await fetch(`/api/notes/${selectedId}`, {
          method: 'DELETE'
        });
        
        if (!res.ok) throw new Error('Delete failed');
        
        showToast('메모가 삭제되었습니다.');
        await fetchNotes();
      } catch (e) {
        showToast('삭제에 실패했습니다.');
        console.error(e);
      }
    }

    function loadSelectedNote() {
      const selectedOption = notesList.selectedOptions[0];
      if (!selectedOption) {
        showToast('불러올 메모를 아래에서 선택해주세요.');
        return;
      }
      memoInput.value = selectedOption.title; // Load full text from title attribute
      showToast('메모를 블러왔습니다.');
    }

    function downloadNoteTxt() {
      const content = memoInput.value.trim();
      if (!content) {
        showToast('다운로드할 내용이 없습니다.');
        memoInput.focus();
        return;
      }

      // Create blob and download link
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `memo_${new Date().getTime()}.txt`; // example: memo_16781234567.txt
      document.body.appendChild(a);
      a.click();
      
      // Cleanup
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
      showToast('메모를 TXT 파일로 다운로드했습니다.');
    }

    // Event Listeners
    saveBtn.addEventListener('click', saveNote);
    loadBtn.addEventListener('click', loadSelectedNote);
    downloadBtn.addEventListener('click', downloadNoteTxt);
    deleteBtn.addEventListener('click', deleteNote);
    
    // Double click to load
    notesList.addEventListener('dblclick', loadSelectedNote);

    // Initial load
    fetchNotes();
  </script>
</body>
</html>
